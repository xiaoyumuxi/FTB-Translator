name: Build Desktop App

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: windows
          - os: macos-latest
            suffix: macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync project dependencies
        run: |
          uv sync --dev

      - name: Run unit tests
        run: uv run python -m tests.run_groups unit

      - name: Build Windows exe
        if: runner.os == 'Windows'
        run: >
          uv run python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name FTB-Translater
          --collect-data customtkinter
          main.py

      - name: Prepare Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item "dist/FTB-Translater.exe" "artifacts/FTB-Translater-windows.exe" -Force
          Get-Item "artifacts/FTB-Translater-windows.exe"

      - name: Build macOS app
        if: runner.os == 'macOS'
        run: >
          uv run python -m PyInstaller
          --noconfirm
          --clean
          --windowed
          --name FTB-Translater
          --collect-data customtkinter
          main.py

      - name: Prepare macOS dmg
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          hdiutil create \
            -volname FTB-Translater \
            -srcfolder dist/FTB-Translater.app \
            -ov \
            -format UDZO \
            artifacts/FTB-Translater-macos.dmg
          ls -lh artifacts/FTB-Translater-macos.dmg

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
