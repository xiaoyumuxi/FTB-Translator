name: CI/CD

on:
  pull_request:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag for publishing a GitHub Release (for example v0.2.0)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

permissions:
  contents: read

jobs:
  rust-quality:
    name: Rust quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Run Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Run Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib
      - name: Run offline integration tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --test golden_fixtures
      - name: Run Rust documentation tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --doc

  frontend-quality:
    name: Frontend quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  package:
    name: Package installers
    needs: [rust-quality, frontend-quality]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x86_64
          - os: macos-latest
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
      - name: Install frontend dependencies
        run: npm ci
      - name: Read application version
        id: version
        shell: bash
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Build Tauri installer
        run: npm run tauri -- build
      - uses: actions/upload-artifact@v6
        with:
          name: FTB-Translator-v${{ steps.version.outputs.value }}-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: package
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release-artifacts
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: release-artifacts/**/*
          fail_on_unmatched_files: true
